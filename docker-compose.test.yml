services:
  test-db:
    image: postgres:16-alpine
    container_name: pricengine_test_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pricengine_test
    ports:
      - "5434:5432"
    # Ephemeral storage — the test database is disposable and rebuilt on demand.
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./prisma/bootstrap/dev-init.sql:/docker-entrypoint-initdb.d/01-rls-role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 15
