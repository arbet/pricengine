services:
  db:
    image: postgres:17-alpine
    container_name: pricengine-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pricengine_dev
    volumes:
      - pricengine_pgdata:/var/lib/postgresql/data

volumes:
  pricengine_pgdata:
